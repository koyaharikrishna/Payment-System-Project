# VERSION 1 DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: v1
  template:
    metadata:
      labels:
        app: v1
    spec:
      containers:
      - name: payment-app
        image: madhulika7/payment-system:v1
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: service-v1
spec:
  type: NodePort
  selector:
    app: v1
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30001
---
